<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: white;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Time axis -->
<line x1="60" y1="252" x2="640" y2="252" stroke="#888" stroke-width="0.5" opacity="0.4"/>
<text x="640" y="268" text-anchor="end" font-size="12" fill="#888" opacity="0.5">time</text>
<line x1="635" y1="249" x2="640" y2="252" stroke="#888" stroke-width="0.5" opacity="0.4"/>
<line x1="635" y1="255" x2="640" y2="252" stroke="#888" stroke-width="0.5" opacity="0.4"/>

<!-- Account A label -->
<text x="40" y="118" text-anchor="end" font-size="14" font-weight="500" fill="#333">Acct A</text>
<text x="40" y="134" text-anchor="end" font-size="12" fill="#888">(trigger)</text>

<!-- A DQ bar -->
<rect x="120" y="105" width="200" height="38" rx="4" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="220" y="128" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">A delinquency</text>

<!-- A.start / A.end -->
<text x="120" y="155" font-size="12" fill="#888">A.start</text>
<line x1="120" y1="143" x2="120" y2="252" stroke="#888" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.25"/>
<text x="320" y="155" font-size="12" fill="#888">A.end</text>
<line x1="320" y1="143" x2="320" y2="252" stroke="#888" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.25"/>

<!-- W window -->
<rect x="320" y="99" width="80" height="50" rx="0" fill="#888" opacity="0.06"/>
<line x1="320" y1="99" x2="400" y2="99" stroke="#888" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
<line x1="320" y1="149" x2="400" y2="149" stroke="#888" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
<line x1="400" y1="99" x2="400" y2="149" stroke="#888" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
<text x="360" y="92" text-anchor="middle" font-size="12" fill="#888" opacity="0.6">W days</text>
<line x1="322" y1="86" x2="398" y2="86" stroke="#888" stroke-width="0.5" opacity="0.35" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<!-- Account B label -->
<text x="40" y="200" text-anchor="end" font-size="14" font-weight="500" fill="#333">Acct B</text>
<text x="40" y="216" text-anchor="end" font-size="12" fill="#888">(escalated)</text>

<!-- B DQ bar -->
<rect x="360" y="187" width="140" height="38" rx="4" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="430" y="210" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">B delinquency</text>

<!-- Escalation day marker -->
<line x1="360" y1="170" x2="360" y2="252" stroke="#EF9F27" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="360" y="168" text-anchor="middle" font-size="12" fill="#BA7517">B.start</text>
<rect x="328" y="256" width="64" height="18" rx="9" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="360" y="269" text-anchor="middle" font-size="10" fill="#854F0B">escalation day</text>

<!-- B.end -->
<text x="500" y="237" font-size="12" fill="#888">B.end</text>
<line x1="500" y1="225" x2="500" y2="252" stroke="#888" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.25"/>

<!-- Escalation condition -->
<text x="360" y="70" text-anchor="middle" font-size="12" fill="#888" opacity="0.55">Escalation condition:</text>
<text x="360" y="84" text-anchor="middle" font-size="12" fill="#888" opacity="0.55">B.start >= A.start AND B.start &lt;= A.end + W</text>

<!-- Person link -->
<path d="M220 143 Q220 165, 260 165 Q300 165, 360 187" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="3 2" opacity="0.35"/>
<circle cx="260" cy="165" r="8" fill="#f5f5f0" stroke="#888" stroke-width="0.5"/>
<text x="260" y="169" text-anchor="middle" font-size="10" fill="#888">P</text>

<!-- Z observation window -->
<rect x="360" y="290" width="250" height="170" rx="8" fill="#f5f5f0" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="5 3"/>
<text x="485" y="308" text-anchor="middle" font-size="12" fill="#534AB7">Observation window: Z days from escalation day</text>
<line x1="362" y1="462" x2="608" y2="462" stroke="#7F77DD" stroke-width="0.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text x="485" y="478" text-anchor="middle" font-size="12" fill="#534AB7">Z = {30, 60, 90, 120} days</text>

<!-- A-side events -->
<text x="375" y="332" font-size="12" fill="#993C1D">Events on A's account:</text>
<circle cx="385" cy="347" r="4" fill="#F09595"/><text x="395" y="351" font-size="12" fill="#888">terminal</text>
<circle cx="455" cy="347" r="4" fill="#FAC775"/><text x="465" y="351" font-size="12" fill="#888">negative</text>
<circle cx="525" cy="347" r="4" fill="#97C459"/><text x="535" y="351" font-size="12" fill="#888">positive</text>
<rect x="375" y="358" width="6" height="6" rx="1" fill="#AFA9EC"/><text x="387" y="367" font-size="12" fill="#888">dq start</text>
<rect x="455" y="358" width="6" height="6" rx="1" fill="#AFA9EC" opacity="0.5"/><text x="467" y="367" font-size="12" fill="#888">dq end</text>

<line x1="375" y1="380" x2="595" y2="380" stroke="#ccc" stroke-width="0.5" opacity="0.3"/>

<!-- B-side events -->
<text x="375" y="398" font-size="12" fill="#185FA5">Events on B's account:</text>
<circle cx="385" cy="413" r="4" fill="#F09595"/><text x="395" y="417" font-size="12" fill="#888">terminal</text>
<circle cx="455" cy="413" r="4" fill="#FAC775"/><text x="465" y="417" font-size="12" fill="#888">negative</text>
<circle cx="525" cy="413" r="4" fill="#97C459"/><text x="535" y="417" font-size="12" fill="#888">positive</text>
<rect x="375" y="424" width="6" height="6" rx="1" fill="#85B7EB"/><text x="387" y="433" font-size="12" fill="#888">dq start</text>
<rect x="455" y="424" width="6" height="6" rx="1" fill="#85B7EB" opacity="0.5"/><text x="467" y="433" font-size="12" fill="#888">dq end</text>

<line x1="375" y1="446" x2="595" y2="446" stroke="#ccc" stroke-width="0.5" opacity="0.3"/>
<text x="485" y="456" text-anchor="middle" font-size="12" fill="#888" opacity="0.5">A + B combined = total person-level exposure</text>

<!-- Connectors -->
<line x1="360" y1="274" x2="360" y2="290" stroke="#EF9F27" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="610" y1="290" x2="610" y2="462" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="5 3"/>
</svg>