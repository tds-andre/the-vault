# env.yaml — machine-specific environment config
# Git-ignored. Do not commit this file.
# Copy env.template.yaml and fill in values on each new machine.
# All paths under 'paths' are relative to central.root.

machine:
  name: main-pc          # main-pc | notebook | work-laptop | etc.
  os: windows
  user: tdsnit

central:
  root: C:/Users/tdsnit/agents

paths:
  vault:        vault
  agents_repo:  repos/agents
  claude:       system/claude
  python:       system/python314
  ofp:          personal/ofp
  resume:       personal/resume
  sod_report:   repos/sod-report
  cbrs:         repos/cbrs-link
  akuvo:        repos/akuvo-analytics
  raytrace:     repos/raytrace
  cocorico:     cocorico/gdrive
  cocorico_old: cocorico/gdrive_old
  whatsapp:     storage/whatsapp
  akuvo_data:   storage/akuvo-data
