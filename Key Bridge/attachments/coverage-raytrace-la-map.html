  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #eee; }
    header {
      padding: 16px 20px;
      background: #1a1a2e;
      border-bottom: 1px solid #333;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p  { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
    #map { width: 100%; height: calc(100vh - 110px); }
    .controls {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 20px; background: #111; border-top: 1px solid #333;
    }
    .controls label { font-size: 0.85rem; color: #ccc; }
    .controls input[type=range] { width: 180px; accent-color: #ff6b35; }
    .btn {
      background: #2a2a3e; border: 1px solid #555; color: #eee;
      padding: 5px 14px; border-radius: 4px; cursor: pointer;
      font-size: 0.85rem; user-select: none;
    }
    .btn:hover { background: #3a3a5e; border-color: #ff6b35; }
    .rotate-label { font-size: 0.85rem; color: #ccc; }
    #rotation-value { font-size: 0.8rem; color: #aaa; min-width: 40px; }
    .note {
      background: #2a1a00; border-left: 3px solid #ff9900;
      padding: 8px 14px; margin: 8px 20px;
      font-size: 0.8rem; color: #ffcc88; border-radius: 3px;
    }
    .legend {
      position: absolute; bottom: 120px; right: 12px;
      background: rgba(0,0,0,0.7); border-radius: 6px;
      padding: 10px 14px; font-size: 0.75rem; color: #eee;
      pointer-events: none;
    }
    .legend-bar {
      width: 18px; height: 120px;
      background: linear-gradient(to bottom,
        #fcffa4, #f98e09, #bc3754, #57106e, #000004);
      border-radius: 3px; margin: 6px auto 4px;
    }
    .legend-labels { display: flex; flex-direction: column;
      justify-content: space-between; height: 120px; font-size: 0.7rem;
      color: #aaa; text-align: right; }
  </style>
</head>

      coordinates: coverageCoords,

    map.addLayer({
      id: "coverage-layer",
      type: "raster",
      source: "coverage-src",
      paint: {
        "raster-opacity": 0.80,
        "raster-fade-duration": 0,
      },
    });

    // Add a marker at the transmitter location
    new maplibregl.Marker({ color: "#ff6b35" })
      .setLngLat([-118.2614, 34.0499])
      .setPopup(new maplibregl.Popup().setHTML(
        "<b>gNB Transmitter</b><br>Height: 30 m<br>Freq: 3.625 GHz (CBRS)"
      ))
      .addTo(map);
  });

  // Opacity slider
  const slider = document.getElementById("opacity-slider");
  const label  = document.getElementById("opacity-value");
  slider.addEventListener("input", () => {
    const val = slider.value / 100;
    map.setPaintProperty("coverage-layer", "raster-opacity", val);
    label.textContent = slider.value + "%";
  });

  // Rotation — rotate the 4 corner coordinates around the scene centre
  let rotationDeg = 0;
  const centre = [-118.2614, 34.0499];

  function rotateCoords(coords, deg) {
    const rad = deg * Math.PI / 180;
    const cos = Math.cos(rad), sin = Math.sin(rad);
    return coords.map(([lon, lat]) => {
      const dlon = lon - centre[0];
      const dlat = lat - centre[1];
      return [
        centre[0] + dlon * cos - dlat * sin,
        centre[1] + dlon * sin + dlat * cos,
      ];
    });
  }

  function applyRotation() {
    const rotated = rotateCoords(coverageCoords, rotationDeg);
    map.getSource("coverage-src").setCoordinates(rotated);
    document.getElementById("rotation-value").textContent = rotationDeg + "°";
  }

  document.getElementById("rot-left").addEventListener("click", () => {
    rotationDeg = (rotationDeg - 15 + 360) % 360;
    applyRotation();
  });
  document.getElementById("rot-right").addEventListener("click", () => {
    rotationDeg = (rotationDeg + 15) % 360;
    applyRotation();
  });
</script>
